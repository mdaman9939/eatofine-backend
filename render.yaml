services:
  - type: web
    name: eatofine-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production

      # ── MongoDB Atlas — set these in Render dashboard ─────────────────
      - key: MONGO_USER
        sync: false      # e.g. aman_admin
      - key: MONGO_PASSWORD
        sync: false      # literal password — encoder runs at boot
      - key: MONGO_HOSTS
        sync: false      # ac-...mongodb.net:27017,ac-...mongodb.net:27017,...
      - key: MONGO_DATABASE
        sync: false      # eatofine
      - key: MONGO_REPLICA_SET
        sync: false      # atlas-fv6e0i-shard-0
      - key: MONGO_AUTH_SOURCE
        sync: false      # admin

      # ── Auth & CORS ───────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false      # 32-byte hex: openssl rand -hex 32
      - key: CORS_ORIGINS
        sync: false      # e.g. https://eatofine-admin.vercel.app
      - key: STORAGE_BASE_URL
        sync: false      # e.g. https://eatofine-backend.onrender.com/storage

      # ── Feature flags — all routes go to MongoDB Atlas ───────────────
      # Code already defaults to "1" if missing, but listing them explicitly
      # so the Render dashboard shows every flag at a glance.
      - key: USE_MONGO_CATALOG
        value: "1"
      - key: USE_MONGO_AUTH
        value: "1"
      - key: USE_MONGO_ADMIN
        value: "1"
      - key: USE_MONGO_BROWSE
        value: "1"
      - key: USE_MONGO_ORDER
        value: "1"
      - key: USE_MONGO_CUSTOMER
        value: "1"
      - key: USE_MONGO_OPS
        value: "1"
      - key: USE_MONGO_ENHANCEMENTS
        value: "1"
      - key: USE_MONGO_DOCUMENTS
        value: "1"
      - key: USE_MONGO_COMPLETION
        value: "1"
      - key: USE_MONGO_EXTRAS
        value: "1"
      - key: USE_MONGO_BUSINESS_SETTINGS
        value: "1"
      - key: USE_MONGO_CONFIG
        value: "1"

      # ── Optional ──────────────────────────────────────────────────────
      - key: STRICT_ENV_CHECK
        value: "0"       # set to "1" to escalate env warnings to boot failures
      - key: AUTH_THROTTLE_LIMIT
        value: "30"      # demo-friendly; tighten to 5 for prod
      - key: AUTH_THROTTLE_TTL
        value: "300000"  # 5 min in ms (demo)
