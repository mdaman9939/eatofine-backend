services:
  - type: web
    name: eatofine-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false      # set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false      # e.g. https://eatofine.vercel.app
      - key: STORAGE_BASE_URL
        sync: false      # e.g. https://eatofine-api.onrender.com/storage
